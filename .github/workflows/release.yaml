name: Build & Release

on:
  release:
    types: [published]
    tags:
      - "v*.*.*"

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write # 允许上传发布内容和提交代码

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 确保获取完整的历史和标签
          persist-credentials: true # 保留凭据用于后续提交

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          architecture: "x64"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache Nuitka builds
        uses: actions/cache@v4
        with:
          path: |
            frontend_gui.build/
            frontend_gui.dist/
            frontend_gui.onefile-build/
          key: ${{ runner.os }}-nuitka-${{ hashFiles('frontend_gui.py', 'backend_gui.py', '**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-nuitka-

      - name: Generate version.py
        run: |
          # 从标签提取版本号（去除前缀v）
          $version = "${{ github.ref_name }}".TrimStart('v')
          # 创建version.py文件
          "
          # 版本号
          __version__ = '$version'
          " | Out-File -FilePath version.py -Encoding utf8
          # 显示生成的文件内容（用于验证）
          Get-Content version.py
        shell: pwsh

      - name: Commit version.py
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add version.py
          git commit -m "🔧 chore: update version to ${{ github.ref_name }}" || exit 0
          git push origin HEAD:main || exit 0
        shell: bash
        continue-on-error: true

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # 确保安装 Nuitka
          pip install nuitka

      - name: Generate Changelog
        run: |
          python scripts/generate_changelog.py "${{ github.ref_name }}" > CHANGELOG.md
        shell: bash
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Build Executable with Nuitka
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          # 构建命令
          python -m nuitka `
          --onefile `
          --windows-console-mode=disable `
          --product-name=Cai-Installer-Gui `
          --product-version=$version `
          --enable-plugin=tk-inter `
          --include-package=ttkbootstrap,httpx,aiofiles,vdf `
          --include-package=backend,ui,utils `
          --include-module=version `
          --assume-yes-for-downloads `
          --follow-imports `
          -o Cai-Installer-Gui `
          main.py
        shell: pwsh

      - name: Upload Artifacts to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Cai-Installer-Gui.exe
          body_path: CHANGELOG.md
          name: ${{ github.ref_name }} # 发布名称与标签匹配